# netlify.toml - Main configuration file for Netlify

# 1. Build settings for Vite + React
[build]
  command = "npm run build"           # or "vite build" if you prefer
  publish = "dist"                    # Vite default output folder

  # Optional: force Node version (helps with consistency)
  environment = { NODE_VERSION = "20" }

# 2. React Router – send ALL paths to index.html (SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true                        # force even if file exists

# 3. Netlify Functions (for subscribe endpoint, etc.)
[functions]
  directory = "netlify/functions"     # must match your folder structure
  node_bundler = "esbuild"            # faster bundling
  # Optional: include external packages if needed
  # included_files = ["node_modules/resend/**"]

# 4. Environment variables (only non-sensitive defaults here)
# Sensitive ones (RESEND_API_KEY, etc.) MUST be set in Netlify dashboard
[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "development"

# 5. Security & performance headers (applied to all pages)
[[headers]]
  for = "/*"
    [headers.values]
      # Security headers
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      Referrer-Policy = "strict-origin-when-cross-origin"
      X-Content-Type-Options = "nosniff"

      # Content-Security-Policy – allows Google Maps embeds + other common needs
      Content-Security-Policy = """
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.google.com https://*.gstatic.com https://www.googletagmanager.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self' https://*.netlify.app https://*.netlify.com https://api.resend.com;
        frame-src 'self' https://www.google.com https://www.google.com/maps;
        object-src 'none';
        base-uri 'self';
        form-action 'self'
      """

# 6. Optional: image & asset optimization (Netlify does most automatically)
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true